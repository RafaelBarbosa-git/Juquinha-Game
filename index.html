<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo do Juquinha - Museu Vivo</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; }
        #game-container { position: relative; width: 800px; height: 480px; overflow: hidden; border: 4px solid #5d4037; }
        canvas { background: #f4a460; /* Cor de areia da Caatinga */ }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: all; }
        .hidden { display: none; }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #81c784; border: none; }
        canvas {
    background: linear-gradient(to bottom, #4fc3f7, #f4a460); /* Céu azul para areia */
}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="480"></canvas>
    <div id="ui-layer">
        <!-- Tela de Início -->
        <div id="start-screen" class="screen">
            <h1>MUNDO DO JUQUINHA</h1>
            <p>Museu Vivo Répteis da Caatinga</p>
            <button onclick="startGame()">INICIAR AVENTURA</button>
        </div>
        <!-- Game Over -->
        <div id="game-over" class="screen hidden">
            <h1>GAME OVER</h1>
            <button onclick="restartGame()">TENTAR NOVAMENTE</button>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
